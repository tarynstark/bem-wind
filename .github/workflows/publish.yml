name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      # No token: npm authenticates via GitHub OIDC against the package's
      # configured trusted publisher, and attaches a provenance attestation.
      # (Node 24 ships npm >= 11.5.1, which OIDC trusted publishing requires.)
      - name: Publish to npm
        run: npm publish --access public
