name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing (OIDC) requires npm >= 11.5.1, newer than what Node 20 ships
      - name: Update npm
        run: npm install -g npm@latest

      # No token: npm authenticates via GitHub OIDC against the package's
      # configured trusted publisher, and attaches a provenance attestation.
      - name: Publish to npm
        run: npm publish --access public
